layers:
  - id: L1
    name: hard_facts
    precedence: 100
    scope: global
  - id: L2
    name: author_intent
    precedence: 80
    scope: book
  - id: L3
    name: planning
    precedence: 60
    scope: arc
  - id: L4
    name: current_task
    precedence: 70
    scope: local
sections:
  hard:
    - story_bible
    - current_state
    - book_rules
  soft:
    - author_intent
    - current_focus
    - volume_outline
  diagnostic:
    - anti_ai_checks
    - continuity_audit
    - style_regression_checks
overrideEdges:
  - from: L4
    to: L3
    allowed: true
    scope: current_chapter
  - from: L4
    to: L2
    allowed: false
    scope: current_chapter
  - from: L4
    to: L1
    allowed: false
    scope: current_chapter
activeOverrides:
  - from: L4
    to: L3
    target: >-
      隔离一夜，主角无恙，三人成功占下学校小卖铺，盘点物资，物资种类和数量要复合现实中的情况，确认足够3人支撑半个月，三人在小卖铺中对现有的物资进行了规划和分配，并利用现有设备做出末世后的第一顿热饭；在短暂安全中，他们第一次真正感受到据点带来的安稳和幸福感
    reason: allow local outline deferral
